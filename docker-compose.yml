version: '3.8'

services:

  app:
    build:
      context: .
      dockerfile: src/Dockerfile
    container_name: self_healing_app
    env_file: .env
    environment:
      - DATA_DIR=/app/data
    ports:
      - "5000:5000"
    volumes:
      - app_data:/app/data
    restart: always

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - app
    restart: always

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: always

volumes:
  app_data:
