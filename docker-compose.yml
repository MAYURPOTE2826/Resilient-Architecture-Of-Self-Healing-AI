version: '3.8'

services:

  app:
    build:
      context: .
      dockerfile: src/Dockerfile
    container_name: self_healing_app
    env_file: .env
    environment:
      - DATA_DIR=/app/data
      - PING_TARGET=8.8.8.8
    ports:
      - "5000:5000"
    volumes:
      - app_data:/app/data
    depends_on:
      - postgres
    restart: always

  postgres:
    image: postgres:15-alpine
    container_name: self_healing_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: self_healing
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: always

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: always

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - app
    restart: always

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: always

volumes:
  app_data:
  pg_data:
