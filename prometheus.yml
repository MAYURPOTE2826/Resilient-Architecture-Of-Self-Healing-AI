global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: 'production'
    service: 'self-healing-engine'

# Load alert rules
rule_files:
  - /etc/prometheus/alert.rules.yml

scrape_configs:
  # ── Self-Healing Engine App Metrics ────────────────────────
  # The /metrics endpoint is protected — uses API key header
  - job_name: self_healing_engine
    static_configs:
      - targets: ["app:5000"]
    metrics_path: /metrics
    # Use API key for auth (set via ADMIN_API_KEY in .env)
    # Note: Pass via Docker secret or env-substituted file in CI
    authorization:
      type: Bearer
      credentials_file: /etc/prometheus/bearer_token

  # ── Prometheus self-monitoring ─────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # ── Loki monitoring ────────────────────────────────────────
  - job_name: loki
    static_configs:
      - targets: ["loki:3100"]
    metrics_path: /metrics