global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: 'local'
    service: 'self-healing-engine'

scrape_configs:
  - job_name: self_healing_engine
    static_configs:
      - targets: ["localhost:5000"]
    metrics_path: /metrics

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
