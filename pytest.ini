[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
pythonpath = src
addopts =
    -v
    --tb=short
    --cov=src
    --cov-report=term-missing
    --cov-report=xml:coverage.xml
    --cov-fail-under=80

[coverage:run]
source = src
omit =
    src/venv/*
    src/__pycache__/*
    src/alembic/*
    src/train.py
    src/stress_test.py
    src/refactor_api.py
    src/refactor_api_db.py
    src/add_health.py
    src/check_artifacts.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if __name__ == .__main__.:
    pass
